name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        arch: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: 0.16.0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Linux x86_64
        if: matrix.os == 'macos-latest' && matrix.arch == 'x86_64'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl
          tar -czvf hoz-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz zig-out/bin/hoz

      - name: Build Linux aarch64
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl
          tar -czvf hoz-${{ steps.version.outputs.VERSION }}-linux-aarch64.tar.gz zig-out/bin/hoz

      - name: Build macOS x86_64
        if: matrix.os == 'macos-latest' && matrix.arch == 'x86_64'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-macos-none
          tar -czvf hoz-${{ steps.version.outputs.VERSION }}-macos-x86_64.tar.gz zig-out/bin/hoz

      - name: Build macOS aarch64
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos-none
          tar -czvf hoz-${{ steps.version.outputs.VERSION }}-macos-aarch64.tar.gz zig-out/bin/hoz

      - name: Build Windows x86_64
        if: matrix.os == 'windows-latest'
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-windows-gnu
          Compress-Archive -Path zig-out/bin/hoz.exe -DestinationPath hoz-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hoz-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hoz-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            hoz-*.tar.gz
            hoz-*.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
